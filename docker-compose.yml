version: "3.8"
services:
  backend:
    build:
      context: .
      dockerfile: nodeskclaw-backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./nodeskclaw-backend:/app
    env_file:
      - ./nodeskclaw-backend/.env
    command: uv run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    restart: unless-stopped
