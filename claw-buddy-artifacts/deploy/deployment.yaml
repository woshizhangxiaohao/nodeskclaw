# ClawBuddy Deployment
# 用途: 部署 ClawBuddy 管理平台后端
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawbuddy
  namespace: clawbuddy
  labels:
    app.kubernetes.io/name: clawbuddy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: clawbuddy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clawbuddy
    spec:
      serviceAccountName: clawbuddy-sa
      containers:
        - name: clawbuddy
          # 镜像地址需替换为实际的容器镜像仓库 地址
          image: cr-cn-beijing.<CLOUD_VENDOR_DOMAIN>/clawbuddy/clawbuddy-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            # 非敏感配置（飞书 ID、VKE 子网等）
            - configMapRef:
                name: clawbuddy-config
            # 敏感配置（JWT Secret、飞书 Secret、加密密钥等）
            - secretRef:
                name: clawbuddy-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      # ClawBuddy 使用PostgreSQL，无需本地 PVC
