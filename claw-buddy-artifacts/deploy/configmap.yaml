# ClawBuddy ConfigMap（非敏感配置）
# 用途: 注入到 ClawBuddy 后端 Pod 的环境变量
#
# 部署时需要替换占位符为实际值:
#   - FEISHU_APP_ID: 飞书应用 ID
#   - FEISHU_REDIRECT_URI: 飞书 OAuth 回调地址
#   - VKE_SUBNET_ID: K8s 集群 CLB 所在子网 ID
#   - IMAGE_REGISTRY: OpenClaw 镜像仓库地址
#   - DATABASE_URL: PostgreSQL 连接地址
apiVersion: v1
kind: ConfigMap
metadata:
  name: clawbuddy-config
  namespace: clawbuddy
  labels:
    app.kubernetes.io/name: clawbuddy
data:
  # 飞书 SSO 登录
  FEISHU_APP_ID: "<your-feishu-app-id>"
  FEISHU_REDIRECT_URI: "https://<your-domain>/api/v1/auth/feishu/callback"

  # K8s 集群
  VKE_SUBNET_ID: "<your-vke-subnet-id>"

  # OpenClaw 镜像仓库地址（页面可管理，此为初始默认值）
  IMAGE_REGISTRY: "cr-cn-beijing.<CLOUD_VENDOR_DOMAIN>/clawbuddy/openclaw"

  # 数据库
  DATABASE_URL: "postgresql+asyncpg://<user>:<password>@<host>:5432/<dbname>"
