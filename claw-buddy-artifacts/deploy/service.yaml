# ClawBuddy Service
# 用途: 暴露 ClawBuddy 后端服务
#
# 默认使用 ClusterIP，配合 Ingress 对外暴露
# 如需直接公网访问，可改为 LoadBalancer 并添加K8s 集群 annotation
apiVersion: v1
kind: Service
metadata:
  name: clawbuddy
  namespace: clawbuddy
  labels:
    app.kubernetes.io/name: clawbuddy
  # 如果使用 LoadBalancer 类型，取消注释以下 annotation:
  # annotations:
  #   service.beta.kubernetes.io/volcengine-loadbalancer-subnet-id: "<your-subnet-id>"
  #   service.beta.kubernetes.io/volcengine-loadbalancer-address-type: "PUBLIC"
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: clawbuddy
