# ClawBuddy Ingress（可选）
# 用途: 通过域名访问 ClawBuddy 管理平台
#
# 前提条件:
#   - VKE 集群已安装 ingress-nginx 组件
#   - 域名已解析到 Ingress Controller 的外部 IP
#
# 部署时需替换 <your-domain> 为实际域名
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clawbuddy
  namespace: clawbuddy
  labels:
    app.kubernetes.io/name: clawbuddy
  annotations:
    # 请求体大小限制（上传 KubeConfig 等场景）
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # WebSocket / SSE 支持
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: <your-domain>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clawbuddy
                port:
                  number: 80
  # 如需 HTTPS，取消注释以下配置并配置 cert-manager 或手动创建 TLS Secret:
  # tls:
  #   - hosts:
  #       - <your-domain>
  #     secretName: clawbuddy-tls
