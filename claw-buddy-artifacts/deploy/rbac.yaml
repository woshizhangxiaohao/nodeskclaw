# ClawBuddy RBAC 配置
# 用途: 授予 ClawBuddy 管理 OpenClaw 实例所需的 K8s 权限
#
# 包含:
#   - ServiceAccount: clawbuddy-sa
#   - ClusterRole: clawbuddy-role（集群级别权限）
#   - ClusterRoleBinding: clawbuddy-binding

---
# 1. ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: clawbuddy-sa
  namespace: clawbuddy

---
# 2. ClusterRole（集群级别权限）
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: clawbuddy-role
rules:
  # Namespace 管理
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "patch"]

  # Node 查看（集群概览页面用）
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

  # Pod 操作（查看、日志、exec）
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "delete", "create"]

  # Secret 操作（敏感配置注入，如 API Key）
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # Service 操作
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # ConfigMap 操作（实例环境变量配置）
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # Deployment 操作（部署、扩缩容、滚动更新）
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Ingress + NetworkPolicy 操作
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # ResourceQuota + LimitRange（实例隔离）
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # PersistentVolumeClaim（实例持久化存储）
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]

  # Events 查看（事件页面用）
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

  # Metrics（Pod/Node 资源使用量）
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

---
# 3. ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: clawbuddy-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: clawbuddy-role
subjects:
  - kind: ServiceAccount
    name: clawbuddy-sa
    namespace: clawbuddy
